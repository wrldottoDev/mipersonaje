<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Login</title>
</head>
<body>
    <header class="encabezado">
        <div class="contenedor">
            <h1 class="logo">ComicVerse</h1>
            <nav class="menu">
                <a href="ejercicio2.html">Inicio</a>
                <a class="activo" href="login.html">Iniciar sesion</a>
                <a href="registro.html">Registro</a>
                <a href="perfil.html">Perfil</a>
                <a href="libros.html">Libros</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="sesion" class="seccion seccion-alterna">
            <div class="contenedor formulario-contenedor">
                <h2>Iniciar sesion</h2>
                <p>Ingresa con tu correo y contrasena para continuar leyendo.</p>

                <form class="formulario">
                    <label for="correo-sesion">Correo electronico</label>
                    <input id="correo-sesion" type="email" placeholder="usuario@correo.com">

                    <label for="clave-sesion">Contrasena</label>
                    <input id="clave-sesion" type="password" placeholder="Escribe tu contrasena">

                    <button type="submit">Entrar</button>
                </form>
            </div>
        </section>
    </main>
</body>
